<div class="popup-overlay" (click)="onOverlayClick($event)">
  <div class="popup-card">

    <!-- Cabeçalho -->
    <div class="popup-header">
      <h2 class="popup-title">Novo Projeto</h2>
      <button class="btn-close" (click)="fecharPopup()" [disabled]="carregando">✕</button>
    </div>

    <!-- Campo do nome -->
    <div class="field-group">
      <label for="nome-projeto">Nome do projeto</label>
      <input
        id="nome-projeto"
        type="text"
        [(ngModel)]="nome"
        name="nome"
        placeholder="Ex: Sistema de Gestão"
        [disabled]="carregando || sucesso"
      />
    </div>

    <!-- Mensagem de erro -->
    @if (erro) {
      <div class="alert-error">{{ erro }}</div>
    }

    <!-- Mensagem de sucesso -->
    @if (sucesso) {
      <div class="alert-success">Projeto criado com sucesso!</div>
    }

    <!-- Botões -->
    <div class="popup-footer">
      <button class="btn-cancelar" (click)="fecharPopup()" [disabled]="carregando">
        Cancelar
      </button>
      <button class="btn-criar" (click)="criarProjeto()" [disabled]="carregando || sucesso">
        @if (carregando) {
          Criando...
        } @else if (sucesso) {
          Criado!
        } @else {
          Criar Projeto
        }
      </button>
    </div>

  </div>
</div>
