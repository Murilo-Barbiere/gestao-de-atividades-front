<div class="project-container">
  <p class="loading" *ngIf="carregando()">
    Carregando projetos...
  </p>

  <p class="error" *ngIf="erro()">
    {{ erro() }}
  </p>

  <div class="lista_projetos">
    <app-projeto-card
      *ngFor="let projeto of projetos()"
      [projeto] = "projeto">
    </app-projeto-card>
  </div>

  <p class="empty" *ngIf="!carregando() && !erro() && projetos().length === 0">
    Nenhum projeto encontrado.
  </p>
</div>
