<div class="card" (click)="abrirProjeto()">
    <div class="card-header">
        <div class="icon-container">
            <div class="folder-icon"></div>
        </div>
        <h2>{{ projeto().nome }}</h2>
    </div>

    <div class="participantes">
        <ul>
        @for (participante of participantesExibidos(); track participante.id) {
            <li>{{ participante.name | slice:0:1 }}</li>
        }

        @if (temMaisParticipantes()) {
            <li class="mais-participantes">...</li>
        }
        </ul>

        <div class="participantes-contador">
            <div class="user-icon-css"></div>
            <h4>{{projeto().participantes.length}}</h4>
        </div>
    </div>
</div>
