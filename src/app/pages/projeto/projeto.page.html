<div class="projeto-page-container">

  <div class="header">
    <app-home-header></app-home-header>
  </div>

  <div class="lista_atividades">
    @if (projetoId(); as id) {

      <div class="projeto-header">
        <h1 class="projeto-nome">{{ nomeProjeto() || 'Carregando...' }}</h1>
        <div class="header-actions">
          <button class="btn-criar-atividade" (click)="abrirCreateAtividadePopup()">
            Criar Atividade
          </button>
          <button class="btn-editar" (click)="abrirParticipantePopup()">
            Participantes
          </button>
          <button class="btn-editar" (click)="abrirEditPopup()">
            Editar Projeto
          </button>
        </div>
      </div>

      <app-atividade-lista [projetoId]="id"></app-atividade-lista>

    } @else {
      <div class="no-project">
        <p>Projeto invalido ou nao selecionado.</p>
      </div>
    }
  </div>

  @if (mostrarEditPopup() && projetoId()) {
    <app-projeto-edit-popup
      [projetoId]="projetoId()!"
      [nomeAtual]="nomeProjeto()"
      (fechar)="fecharEditPopup()"
      (projetoEditado)="onProjetoEditado($event)"
    ></app-projeto-edit-popup>
  }

  @if (mostrarCreateAtividadePopup() && projetoId()) {
    <app-atividade-create-popup
      [projetoId]="projetoId()!"
      (fechar)="fecharCreateAtividadePopup()"
      (atividadeCriada)="onAtividadeCriada()"
    ></app-atividade-create-popup>
  }

  @if (mostrarParticipantePopup() && projetoId()) {
    <app-participante-popup
      [projetoId]="projetoId()!"
      (fechar)="fecharParticipantePopup()"
    ></app-participante-popup>
  }

</div>
